# Netlify configuration for ASTRA CORE Portfolio

[build]
  # Build command - builds the React frontend
  command = "cd frontend && yarn install --frozen-lockfile && DISABLE_ESLINT_PLUGIN=true CI=false yarn build"
  
  # Output directory - where the built files are
  publish = "frontend/build"
  
  # Ignore backend folder (frontend-only deployment)
  ignore = "git diff --quiet HEAD^ HEAD backend/"

[build.environment]
  # Node version
  NODE_VERSION = "18"
  # Disable Yarn cache
  YARN_VERSION = "1.22.19"

# SPA routing - redirect all routes to index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Cache static assets
[[headers]]
  for = "/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
